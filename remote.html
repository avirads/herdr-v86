<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Herdr Remote LLM</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; min-height: 100dvh; padding: max(16px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left)); display: grid; place-items: center; background: #0d1117; color: #c9d1d9; font: 14px system-ui, sans-serif; }
  main { width: min(100%, 620px); }
  h1 { margin: 0 0 5px; color: #f0f6fc; font-size: 20px; }
  p { margin: 0 0 14px; color: #8b949e; line-height: 1.45; }
  label { display: grid; gap: 6px; color: #8b949e; font-size: 12px; }
  input, button { min-height: 44px; border: 1px solid #30363d; border-radius: 6px; }
  input { width: 100%; padding: 9px 10px; background: #0d1117; color: #f0f6fc; }
  button { padding: 8px 12px; background: #21262d; color: #c9d1d9; }
  button:disabled { opacity: .55; }
  #pairing { padding: 18px; border: 1px solid #30363d; border-radius: 10px; background: #161b22; }
  #connect { width: 100%; margin-top: 10px; }
  #status { min-height: 1.4em; margin-top: 10px; font-size: 12px; }
  #chat { display: none; min-height: min(680px, calc(100dvh - 32px)); grid-template-rows: auto 1fr auto; gap: 10px; }
  #chat.active { display: grid; }
  #log { min-height: 180px; overflow-y: auto; padding: 12px; border: 1px solid #30363d; border-radius: 8px; background: #161b22; white-space: pre-wrap; line-height: 1.5; }
  #chat-form { display: flex; gap: 8px; }
  #prompt { flex: 1; min-width: 0; }
  a { color: #58a6ff; }
  @media (max-width: 520px) { #chat-form { flex-direction: column; } #send { width: 100%; } }
</style>
</head>
<body>
<main>
  <section id="pairing">
    <h1>Connect to desktop LLM</h1>
    <p>This lightweight client does not start the VM or load a model. The desktop Herdr page supplies the WebGPU LLM over WebRTC.</p>
    <label>Pairing key
      <input id="key" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Paste the key shown on the desktop">
    </label>
    <button id="connect" type="button">Connect</button>
    <p id="status">On the desktop, use Settings → Remote access → Host this LLM.</p>
    <a href="./">Open the full Herdr VM</a>
  </section>
  <section id="chat">
    <div><h1>Desktop LLM</h1><p id="chat-status">Connected over WebRTC</p></div>
    <div id="log" aria-live="polite"></div>
    <form id="chat-form">
      <input id="prompt" required autocomplete="off" placeholder="Message the desktop LLM">
      <button id="send" type="submit">Send</button>
    </form>
  </section>
</main>
<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js" crossorigin="anonymous"></script>
<script type="module">
import { RemoteLlmPeer } from './network/browser/remote-llm-peer.js';
const pairing = document.getElementById('pairing');
const chat = document.getElementById('chat');
const status = document.getElementById('status');
const chatStatus = document.getElementById('chat-status');
const key = document.getElementById('key');
const connectButton = document.getElementById('connect');
const log = document.getElementById('log');
const prompt = document.getElementById('prompt');
let remote;

document.getElementById('connect').onclick = async () => {
  if (!key.value.trim()) return;
  connectButton.disabled = true;
  status.textContent = 'Connecting…';
  try {
    if (!globalThis.Peer) throw new Error('WebRTC signaling library did not load');
    remote = new RemoteLlmPeer({ Peer: globalThis.Peer, getLlmClient: () => null });
    remote.addEventListener('activity', event => { chatStatus.textContent = event.detail.message; });
    await remote.connect(key.value.trim());
    pairing.hidden = true;
    chat.classList.add('active');
    prompt.focus();
  } catch (error) {
    status.textContent = 'Connection failed: ' + error.message;
    connectButton.disabled = false;
  }
};

document.getElementById('chat-form').onsubmit = async event => {
  event.preventDefault();
  const message = prompt.value.trim();
  if (!message) return;
  prompt.value = '';
  log.textContent += `You: ${message}\n\nDesktop LLM: `;
  log.scrollTop = log.scrollHeight;
  const send = document.getElementById('send');
  send.disabled = true;
  let streamed = false;
  try {
    const answer = await remote.chat(message, { onChunk: delta => {
      streamed = true;
      log.textContent += delta;
      log.scrollTop = log.scrollHeight;
    }});
    if (!streamed) log.textContent += answer;
    log.textContent += '\n\n';
  }
  catch (error) { log.textContent += `[error: ${error.message}]\n\n`; }
  finally { send.disabled = false; log.scrollTop = log.scrollHeight; prompt.focus(); }
};
</script>
</body>
</html>
