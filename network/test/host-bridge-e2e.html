<!doctype html>
<meta charset="utf-8">
<pre id="serial"></pre>
<div id="screen_container"><div></div><canvas></canvas></div>
<script src="../../libv86-network.js"></script>
<script type="module">
import { V86HostBridge } from '../browser/v86-host-bridge.js';
import { V86GuestReadonlyClient } from '../browser/v86-guest-readonly.js';
let serial = '';
let started = false;
let submitted = false;
setTimeout(() => fetch('/__result', { method: 'POST', body: JSON.stringify({ ok: false, serial }) }), 60000);
const compatibilityBoot = new URLSearchParams(location.search).get('compat') === '1';
const emulator = new V86({
  wasm_path: '../../v86-network.wasm', memory_size: 256 << 20, vga_memory_size: 2 << 20,
  bios: { url: '../../seabios.bin' }, vga_bios: { url: '../../vgabios.bin' },
  bzimage: { url: '../../bzImage-network' },
  cmdline: `root=/dev/sda rw console=ttyS0 tsc=reliable noapic nolapic${compatibilityBoot ? ' libata.force=pio4' : ''}`,
  hda: { url: '../../herdr-vm-network-ext4.img', async: !compatibilityBoot, size: 100663296 },
  screen_container: document.querySelector('#screen_container'), autostart: true,
});
const hostBridge = new V86HostBridge(emulator, {
  llmClient: {
    status: async () => ({ webgpu: true, modelName: 'e2e-model' }),
    models: async () => ({ object: 'list', data: [{ id: 'e2e-model' }] }),
    chat: async () => ({ choices: [{ message: { content: 'webgpu-bridge-ok' } }] }),
  },
});
const guest = new V86GuestReadonlyClient(emulator, hostBridge);
emulator.add_listener('serial0-output-byte', byte => {
  serial = (serial + String.fromCharCode(byte)).slice(-100000);
  document.querySelector('#serial').textContent = serial;
  if (!started && /(?:herdr-vm:~#|~\s*[#%])\s*$/.test(serial)) {
    started = true;
    emulator.serial0_send("mkdir -p /root/project/src; printf 'const needle = 1;\\n' > /root/project/src/main.js; vmfetch -o /tmp/payload http://127.0.0.1:8091/network/test/payload.txt && printf 'VMFETCH_CONTENT=' && cat /tmp/payload; echo; printf 'VMLLM_CONTENT='; vmllm 'hello'; echo VMFETCH_E2E_END\n");
  }
  if (!submitted && /\r?\nVMFETCH_E2E_END\r?\n/.test(serial)) {
    submitted = true;
    (async () => {
      const list = await guest.list('.');
      const read = await guest.read('src/main.js');
      const grep = await guest.grep('needle', '.');
      await guest.write('src/generated.js', 'export const generated = true;\n');
      const written = await guest.read('src/generated.js');
      const executed = await guest.execute('printf deepagents-shell-ok');
      const fetchedStdout = await guest.execute(`vmfetch -o - ${location.origin}/network/test/payload.txt`);
      await guest.delete('src/generated.js');
      const { createHerdrAgent } = await import('../../agent/dist/agent.js');
      let modelCalls = 0;
      const harness = createHerdrAgent({
        guest,
        llmClient: { chat: async () => ({ choices: [{ message: { content: ++modelCalls === 1 ? '{"tool":"write_file","args":{"file_path":"/agent-created.txt","content":"created by Deep Agents\\n"}}' : '{"final":"Deep agent created agent-created.txt."}' } }] }) },
        approveAction: async () => true,
      });
      const agentResult = await harness.run('Create agent-created.txt.');
      const agentWritten = await guest.read('agent-created.txt');
      let fetchModelCalls = 0;
      const fetchHarness = createHerdrAgent({
        guest,
        llmClient: { chat: async () => ({ choices: [{ message: { content: ++fetchModelCalls === 1 ? JSON.stringify({ tool: 'vmfetch', args: { url: `${location.origin}/network/test/payload.txt`, output: 'agent-fetch.txt', method: 'GET', headers: [] } }) : '{"final":"vmfetch completed."}' } }] }) },
        approveAction: async () => true,
      });
      const fetchResult = await fetchHarness.run('Fetch the browser test file.');
      const agentFetched = await guest.read('agent-fetch.txt');
      const ok = serial.includes('VMFETCH_CONTENT=browser-bridge-ok') && serial.includes('webgpu-bridge-ok') && list.includes('src') && read.includes('needle') && grep.includes('src/main.js') && written.includes('generated') && executed.includes('deepagents-shell-ok') && fetchedStdout.includes('browser-bridge-ok') && !fetchedStdout.includes('unrecognized option') && agentWritten.includes('created by Deep Agents') && agentResult.output.includes('agent-created.txt') && agentFetched.includes('browser-bridge-ok') && fetchResult.output.includes('vmfetch completed');
      await fetch('/__result', { method: 'POST', body: JSON.stringify({ ok, serial, list, read, grep, written, executed, fetchedStdout, agentWritten, agentFetched, agentOutput: agentResult.output }) });
    })().catch(error => fetch('/__result', { method: 'POST', body: JSON.stringify({ ok: false, serial: serial + '\n' + error.stack }) }));
  }
});
</script>
