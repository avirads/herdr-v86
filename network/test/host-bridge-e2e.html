<!doctype html>
<meta charset="utf-8">
<pre id="serial"></pre>
<div id="screen_container"><div></div><canvas></canvas></div>
<script src="../../libv86-network.js"></script>
<script type="module">
import { V86HostBridge } from '../browser/v86-host-bridge.js';
import { V86GuestReadonlyClient } from '../browser/v86-guest-readonly.js';
let serial = '';
let started = false;
let submitted = false;
setTimeout(() => fetch('/__result', { method: 'POST', body: JSON.stringify({ ok: false, serial }) }), 60000);
const emulator = new V86({
  wasm_path: '../../v86-network.wasm', memory_size: 256 << 20, vga_memory_size: 2 << 20,
  bios: { url: '../../seabios.bin' }, vga_bios: { url: '../../vgabios.bin' },
  bzimage: { url: '../../bzImage-network' },
  cmdline: 'root=/dev/sda rw console=ttyS0 tsc=reliable noapic nolapic',
  hda: { url: '../../herdr-vm-network-ext4.img', async: true, size: 100663296 },
  screen_container: document.querySelector('#screen_container'), autostart: true,
});
const hostBridge = new V86HostBridge(emulator, {
  llmClient: {
    status: async () => ({ webgpu: true, modelName: 'e2e-model' }),
    models: async () => ({ object: 'list', data: [{ id: 'e2e-model' }] }),
    chat: async () => ({ choices: [{ message: { content: 'webgpu-bridge-ok' } }] }),
  },
});
const guest = new V86GuestReadonlyClient(emulator, hostBridge);
emulator.add_listener('serial0-output-byte', byte => {
  serial = (serial + String.fromCharCode(byte)).slice(-100000);
  document.querySelector('#serial').textContent = serial;
  if (!started && /(?:herdr-vm:~#|~\s*[#%])\s*$/.test(serial)) {
    started = true;
    emulator.serial0_send("mkdir -p /root/project/src; printf 'const needle = 1;\\n' > /root/project/src/main.js; vmfetch -o /tmp/payload http://127.0.0.1:8091/network/test/payload.txt && printf 'VMFETCH_CONTENT=' && cat /tmp/payload; echo; printf 'VMLLM_CONTENT='; vmllm 'hello'; echo VMFETCH_E2E_END\n");
  }
  if (!submitted && /\r?\nVMFETCH_E2E_END\r?\n/.test(serial)) {
    submitted = true;
    (async () => {
      const list = await guest.list('.');
      const read = await guest.read('src/main.js');
      const grep = await guest.grep('needle', '.');
      const { createHerdrReadonlyAgent } = await import('../../agent/dist/agent.js');
      let modelCalls = 0;
      const harness = createHerdrReadonlyAgent({
        guest,
        llmClient: { chat: async () => ({ choices: [{ message: { content: ++modelCalls === 1 ? '{"tool":"guest_list","args":{"path":"."}}' : '{"final":"Deep agent inspected src/main.js."}' } }] }) },
      });
      const agentResult = await harness.run('List the project.');
      const ok = serial.includes('VMFETCH_CONTENT=browser-bridge-ok') && serial.includes('webgpu-bridge-ok') && list.includes('src') && read.includes('needle') && grep.includes('src/main.js') && agentResult.output.includes('src/main.js');
      await fetch('/__result', { method: 'POST', body: JSON.stringify({ ok, serial, list, read, grep, agentOutput: agentResult.output }) });
    })().catch(error => fetch('/__result', { method: 'POST', body: JSON.stringify({ ok: false, serial: serial + '\n' + error.stack }) }));
  }
});
</script>
