<!doctype html>
<meta charset="utf-8">
<title>Rig agent v86 test</title>
<pre id="serial"></pre><div id="screen_container" hidden><div></div><canvas></canvas></div>
<script src="../../libv86-network.js"></script>
<script type="module">
let serial = '', started = false, submitted = false, hostCalls = 0;
const emulator = new V86({ wasm_path:'../../v86-network.wasm', memory_size:256<<20, vga_memory_size:2<<20,
  bios:{url:'../../seabios.bin'}, vga_bios:{url:'../../vgabios.bin'}, bzimage:{url:'../../bzImage-network'},
  cmdline:'root=/dev/sda rw console=ttyS0 tsc=reliable noapic nolapic',
  hda:{url:'../../vm-network-ext4.img',async:true,size:100663296}, uart1:true,
  screen_container:document.querySelector('#screen_container'), autostart:true });
const { V86HostBridge } = await import('../browser/v86-host-bridge.js');
const { V86GuestReadonlyClient } = await import('../browser/v86-guest-readonly.js');
const { VmAgentController } = await import('../browser/vmagent-controller.js');
const hostBridge = new V86HostBridge(emulator,{llmClient:{async chat(){
  hostCalls++;
  if(hostCalls===1)return {id:'rig-tool',model:'webgpu',choices:[{index:0,message:{role:'assistant',content:null,tool_calls:[{id:'rig-write-1',type:'function',function:{name:'write_file',arguments:JSON.stringify({path:'rig-marker.txt',content:'rig-tool-ok\n'})}}]},finish_reason:'tool_calls'}]};
  return {id:'rig-final',model:'webgpu',choices:[{index:0,message:{role:'assistant',content:'rig-tool-complete'},finish_reason:'stop'}]};
}}});
const guest = new V86GuestReadonlyClient(emulator,hostBridge);
const controller = new VmAgentController({
  createAgent:async()=>{throw new Error('unused')},getLlmClient:()=>hostBridge.llmClient,getGuest:()=>guest,
  approveAction:async()=>true,onOutput:async output=>{
    const written=await guest.read('rig-marker.txt').catch(()=> '');
    const ok=String(output).includes('rig-tool-complete')&&written.trim()==='rig-tool-ok'&&hostCalls===2;
    submit(ok,ok?'':'Rig fast tool loop failed');
  }
});
hostBridge.setAgentHandler((command,value)=>controller.handle(command,value));
async function submit(ok,reason=''){if(submitted)return;submitted=true;await fetch('/__result',{method:'POST',body:JSON.stringify({ok,reason,hostCalls,serial})});}
emulator.add_listener('serial0-output-byte',byte=>{
  serial=(serial+String.fromCharCode(byte)).slice(-240000); document.querySelector('#serial').textContent=serial;
  if(!started&&/(?:vm:~#|~\s*[#%])\s*$/.test(serial)){
    started=true;
    emulator.serial0_send("rm -f /root/project/rig-marker.txt; rig 'Create rig-marker.txt containing rig-tool-ok'\n");
  }
});
setTimeout(()=>submit(false,'Rig v86 test timed out'),150000);
</script>
