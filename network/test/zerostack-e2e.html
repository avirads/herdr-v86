<!doctype html>
<meta charset="utf-8">
<title>Zerostack v86 boot test</title>
<pre id="serial"></pre>
<div id="screen_container" hidden><div></div><canvas></canvas></div>
<script src="../../libv86-network.js"></script>
<script type="module">
let serial = '';
let started = false;
let submitted = false;
let hostCalls = 0;
const emulator = new V86({
  wasm_path: '../../v86-network.wasm',
  memory_size: 256 << 20,
  vga_memory_size: 2 << 20,
  bios: { url: '../../seabios.bin' },
  vga_bios: { url: '../../vgabios.bin' },
  bzimage: { url: '../../bzImage-network' },
  cmdline: 'root=/dev/sda rw console=ttyS0 tsc=reliable noapic nolapic',
  hda: { url: '../../vm-network-ext4.img', async: true, size: 100663296 },
  uart1: true,
  screen_container: document.querySelector('#screen_container'),
  autostart: true,
});
const { V86HostBridge } = await import('../browser/v86-host-bridge.js');
new V86HostBridge(emulator, {
  llmClient: {
    async chat() {
      hostCalls += 1;
      return { id: 'mock-1', model: 'webgpu', choices: [{ index: 0, message: { role: 'assistant', content: 'mock-completion' }, finish_reason: 'stop' }] };
    },
  },
});

async function submit(ok, reason = '') {
  if (submitted) return;
  submitted = true;
  await fetch('/__result', { method: 'POST', body: JSON.stringify({ ok, reason, hostCalls, serial }) });
}

emulator.add_listener('serial0-output-byte', byte => {
  serial = (serial + String.fromCharCode(byte)).slice(-200000);
  document.querySelector('#serial').textContent = serial;
  if (!started && /(?:vm:~#|~\s*[#%])\s*$/.test(serial)) {
    started = true;
    emulator.serial0_send("echo ZEROSTACK_BOOT_BEGIN; echo ZEROSTACK_PROMPT_BEGIN; zerostack -p 'summarize this project'; printf '\\nZEROSTACK_PROMPT_EXIT=%s\\n' $?; zerostack --version; printf 'ZEROSTACK_EXIT=%s\\n' $?; test -x /usr/local/libexec/vm-openai-request && echo ZEROSTACK_ADAPTER_OK; sleep 2; ps | grep '[g]etty .*ttyS1' >/dev/null && echo ZEROSTACK_RPC_RESTORED; echo ZEROSTACK_BOOT_END\n");
  }
  if (/\nZEROSTACK_BOOT_END\r?\n/.test(serial) && /\nZEROSTACK_RPC_RESTORED\r?\n/.test(serial)) {
    const promptOutput = serial.match(/\nZEROSTACK_PROMPT_BEGIN\r?\n([\s\S]*?)\r?\nZEROSTACK_PROMPT_EXIT=0/);
    const ok = /zerostack 1\.5\.0/i.test(serial) && promptOutput?.[1]?.includes('mock-completion') && /ZEROSTACK_EXIT=0/.test(serial) && serial.includes('ZEROSTACK_ADAPTER_OK') && serial.includes('ZEROSTACK_RPC_RESTORED') && hostCalls === 1;
    submit(ok, ok ? '' : 'Zerostack package or RPC restoration failed');
  }
});

setTimeout(() => submit(false, 'Zerostack v86 boot test timed out'), 90000);
</script>
