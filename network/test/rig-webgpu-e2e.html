<!doctype html>
<meta charset="utf-8">
<title>Rig real WebGPU timing test</title>
<pre id="serial"></pre><div id="screen_container" hidden><div></div><canvas></canvas></div>
<script src="../../libv86-network.js"></script>
<script type="module">
const startedAt = performance.now();
let serial = '', started = false, submitted = false, commandStartedAt = 0;
const calls = [];
const activities = [];

async function submit(ok, reason = '', extra = {}) {
  if (submitted) return;
  submitted = true;
  await fetch('/__result', { method: 'POST', body: JSON.stringify({
    ok, reason, calls, activities, totalMs: performance.now() - startedAt,
    serial, ...extra,
  }) });
}

try {
  const { LiteRtLmClient } = await import('../browser/litert-lm-client.js');
  const client = new LiteRtLmClient();
  client.addEventListener('activity', event => activities.push({
    atMs: performance.now() - startedAt,
    message: event.detail.message,
  }));
  const modelStartedAt = performance.now();
  await client.initialize({ autoLoad: true, bundledModelUrl: '../../models/gemma-4-E2B-it-web.litertlm' });
  const modelLoadMs = performance.now() - modelStartedAt;
  const warmStartedAt = performance.now();
  await client.chat({ model: 'webgpu', messages: [{ role: 'user', content: 'Reply with exactly: warm' }] });
  const warmupMs = performance.now() - warmStartedAt;
  const originalChat = client.chat.bind(client);
  client.chat = async body => {
    const call = { startedAtMs: performance.now() - startedAt };
    calls.push(call);
    try {
      const result = await originalChat(body);
      call.durationMs = performance.now() - startedAt - call.startedAtMs;
      call.outputChars = result?.choices?.[0]?.message?.content?.length || 0;
      return result;
    } catch (error) {
      call.durationMs = performance.now() - startedAt - call.startedAtMs;
      call.error = error.message;
      throw error;
    }
  };

  const emulator = new V86({
    wasm_path: '../../v86-network.wasm', memory_size: 256 << 20, vga_memory_size: 2 << 20,
    bios: { url: '../../seabios.bin' }, vga_bios: { url: '../../vgabios.bin' },
    bzimage: { url: '../../bzImage-network' },
    cmdline: 'root=/dev/sda rw console=ttyS0 tsc=reliable noapic nolapic',
    hda: { url: '../../vm-network-ext4.img', async: true, size: 100663296 }, uart1: true,
    screen_container: document.querySelector('#screen_container'), autostart: true,
  });
  const { V86HostBridge } = await import('../browser/v86-host-bridge.js');
  new V86HostBridge(emulator, { llmClient: client });
  emulator.add_listener('serial0-output-byte', byte => {
    serial = (serial + String.fromCharCode(byte)).slice(-240000);
    document.querySelector('#serial').textContent = serial;
    if (!started && /(?:vm:~#|~\s*[#%])\s*$/.test(serial)) {
      started = true;
      commandStartedAt = performance.now();
      emulator.serial0_send("echo RIG_WEBGPU_BEGIN; rig 'Reply with exactly: comparison works'; printf '\\nRIG_AGENT_EXIT=%s\\n' $?; echo RIG_WEBGPU_END\n");
    }
    if (/\nRIG_WEBGPU_END\r?\n/.test(serial)) {
      const exitOk = serial.includes('RIG_AGENT_EXIT=0');
      submit(exitOk && calls.length > 0, exitOk ? '' : 'Rig failed or made no WebGPU request', {
        modelLoadMs, warmupMs,
        rigTotalMs: performance.now() - commandStartedAt,
      });
    }
  });
  setTimeout(() => submit(false, 'Rig WebGPU test timed out', { modelLoadMs }), 600000);
} catch (error) {
  submit(false, error?.stack || error?.message || String(error));
}
</script>
