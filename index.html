<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>herdr in the browser (v86)</title>
<link rel="stylesheet" href="xterm.css">
<style>
  body { margin: 0; background: #0d1117; color: #c9d1d9; font: 14px system-ui, sans-serif; }
  header { padding: 10px 14px; display: flex; gap: 12px; align-items: baseline; }
  header h1 { font-size: 15px; margin: 0; }
  #status { font-size: 12px; color: #8b949e; }
  #term { padding: 0 8px 8px; visibility: hidden; }
  #boot-overlay { position: fixed; inset: 0; z-index: 1000; display: grid; place-items: center; background: #0d1117; transition: opacity .35s ease; }
  #boot-overlay.done { opacity: 0; pointer-events: none; }
  #boot-loader { display: grid; justify-items: center; gap: 18px; }
  #boot-ring { width: 112px; height: 112px; border-radius: 50%; display: grid; place-items: center; background: conic-gradient(#58a6ff var(--progress, 1%), #21262d 0); position: relative; transition: background .25s linear; }
  #boot-ring::before { content: ""; position: absolute; inset: 8px; border-radius: 50%; background: #0d1117; }
  #boot-percent { position: relative; font: 600 24px/1 monospace; color: #f0f6fc; }
  #boot-message { color: #8b949e; font-size: 13px; }
  #boot-overlay.error #boot-ring { background: #da3633; }
  #boot-overlay.error #boot-message { color: #ff7b72; max-width: 80vw; text-align: center; }
  #screen_container { display: none; } /* VGA (tty1) hidden; serial is primary. */
  #tools { margin-left: auto; display: flex; flex-wrap: wrap; gap: 6px; }
  button { color: #c9d1d9; background: #21262d; border: 1px solid #30363d; border-radius: 5px; padding: 4px 8px; }
  .tool-link { color: #58a6ff; align-self: center; font-size: 12px; white-space: nowrap; }
</style>
</head>
<body>
<div id="boot-overlay" role="status" aria-live="polite">
  <div id="boot-loader">
    <div id="boot-ring"><span id="boot-percent">1%</span></div>
    <div id="boot-message">Preparing VM…</div>
  </div>
</div>
<header>
  <h1>herdr-vm</h1>
  <div id="status">loading v86…</div>
  <div id="llm-status">WebGPU LLM: not paired</div>
  <div id="browser-status">AutoBro: not connected</div>
  <div id="tools">
    <button id="import-file">Import file</button>
    <button id="open-help" title="Guest command reference">Help</button>
    <button id="configure-llm" title="Load a page-local LiteRT-LM WebGPU model">Configure LLM</button>
    <button id="connect-autobro" title="Pair AutoBro for agent browser automation">Connect AutoBro</button>
    <a class="tool-link" href="https://huggingface.co/litert-community/gemma-4-E2B-it-litert-lm/resolve/main/gemma-4-E2B-it-web.litertlm?download=true" target="_blank" rel="noopener noreferrer" title="Download the approximately 2 GB Gemma E2B WebGPU model">Download LLM model (~2 GB)</a>
    <input id="file-input" type="file" hidden>
    <input id="llm-file-input" type="file" accept=".litertlm,.task" hidden>
  </div>
</header>
<div id="term"></div>
<div id="screen_container">
  <div style="white-space:pre; font:14px monospace"></div>
  <canvas></canvas>
</div>

<script src="xterm.js"></script>
<script src="libv86-network.js"></script>
<script>
"use strict";
(async () => {
const status = (m) => document.getElementById("status").textContent = m;
const networkStatus = () => {};
const bootOverlay = document.getElementById("boot-overlay");
const bootRing = document.getElementById("boot-ring");
const bootPercent = document.getElementById("boot-percent");
const bootMessage = document.getElementById("boot-message");
let bootProgress = 1;
function setBootProgress(value, message) {
  bootProgress = Math.max(bootProgress, Math.min(100, Math.round(value)));
  bootRing.style.setProperty("--progress", `${bootProgress}%`);
  bootPercent.textContent = `${bootProgress}%`;
  if (message) bootMessage.textContent = message;
}
const bootTicker = setInterval(() => {
  if (bootProgress < 90) setBootProgress(bootProgress + 1, "Starting VM…");
}, 700);
function finishBoot() {
  clearInterval(bootTicker);
  bootOverlay.classList.remove("error");
  setBootProgress(100, "Ready");
  status("Shell ready");
  setTimeout(() => {
    term.clear();
    term.write("\x1b[2J\x1b[H");
    emulator.serial0_send("\n");
    bootOverlay.classList.add("done");
    document.getElementById("term").style.visibility = "visible";
    term.focus();
  }, 300);
}
function failBoot(message) {
  clearInterval(bootTicker);
  bootOverlay.classList.add("error");
  bootMessage.textContent = message;
}
const DISK_SIZE = 100663296;
const DISK_VERSION = "herdr-shell-10";
const bootOptions = new URLSearchParams(location.search);
let compatibilityBoot = bootOptions.get("compat") === "1";
const diskURL = `herdr-vm-network-ext4.img?v=${encodeURIComponent(DISK_VERSION)}`;

async function rangePreflight() {
  try {
    setBootProgress(3, "Checking disk delivery…");
    status("checking disk delivery…");
    const response = await fetch(diskURL, {
      headers: { Range: "bytes=0-0" },
      cache: "no-store",
    });
    const contentRange = response.headers.get("content-range") || "";
    const valid = response.status === 206 && contentRange === `bytes 0-0/${DISK_SIZE}`;
    await response.arrayBuffer();
    setBootProgress(8, valid ? "Loading VM…" : "Preparing compatibility boot…");
    return valid;
  } catch {
    return false;
  }
}

if (!compatibilityBoot && !await rangePreflight()) {
  compatibilityBoot = true;
  status("Range delivery unavailable — using compatibility boot");
}

const term = new Terminal({
  cols: 100, rows: 32,
  convertEol: false,
  cursorBlink: true,
  fontFamily: "monospace",
  fontSize: 14,
  theme: { background: "#0d1117" },
});
term.open(document.getElementById("term"));

if (compatibilityBoot) status("compatibility boot — downloading full 96 MiB disk…");
const emulator = new V86({
  wasm_path: "v86-network.wasm",
  memory_size: 256 * 1024 * 1024,
  vga_memory_size: 2 * 1024 * 1024,
  bios: { url: "seabios.bin" },
  vga_bios: { url: "vgabios.bin" },
  bzimage: { url: "bzImage-network" },
  cmdline: `root=/dev/sda rw console=ttyS0 tsc=reliable noapic nolapic${compatibilityBoot ? " libata.force=pio4" : ""}`,
  hda: { url: diskURL, async: !compatibilityBoot, size: DISK_SIZE },
  net_device: { type: "virtio" },
  uart1: true,
  screen_container: document.getElementById("screen_container"),
  autostart: true,
});

let hostBridge;
let webGpuLlmClient;
let autobroClient;
let guestReadonlyClient;
let vmAgentController;
let agentBusy = false;
let agentInput = "";
const hiddenSerialMarkers = ["__V86AGENT_RESPONSE__", "__V86RPC__", "vmagent-rpc agent-"];
let serialDisplayLine = "";
let suppressSerialLine = false;
async function writeAgentTerminal(output) {
  const text = String(output).replace(/\r?\n/g, "\n") + "\n";
  await guestReadonlyClient.write(".herdr-vmagent-output", text);
  await hostBridge.sendConsole("cat /root/project/.herdr-vmagent-output; rm -f /root/project/.herdr-vmagent-output");
}
function writeSerialByte(byte) {
  const character = String.fromCharCode(byte);
  if (character === "\n") {
    if (!suppressSerialLine) term.write(Uint8Array.of(byte));
    serialDisplayLine = "";
    suppressSerialLine = false;
    return;
  }
  if (suppressSerialLine) return;
  serialDisplayLine = (serialDisplayLine + character).slice(-512);
  if (hiddenSerialMarkers.some(marker => serialDisplayLine.includes(marker))) {
    suppressSerialLine = true;
    term.write("\r\x1b[2K");
    return;
  }
  term.write(Uint8Array.of(byte));
}
import("./network/browser/v86-host-bridge.js").then(module => {
  hostBridge = new module.V86HostBridge(emulator, { llmClient: webGpuLlmClient });
  window.v86HostBridge = hostBridge;
  import("./network/browser/v86-guest-readonly.js").then(({ V86GuestReadonlyClient }) => {
    guestReadonlyClient = new V86GuestReadonlyClient(emulator, hostBridge);
    window.v86GuestReadonly = guestReadonlyClient;
    import("./network/browser/vmagent-controller.js").then(async ({ VmAgentController }) => {
      vmAgentController = new VmAgentController({
        createAgent: async options => {
          const { createHerdrAgent } = await import("./agent/dist/agent.js");
          return createHerdrAgent(options);
        },
        getLlmClient: () => webGpuLlmClient,
        getGuest: () => guestReadonlyClient,
        getBrowserClient: () => autobroClient,
        approveAction: async (operation, detail) => confirm(`Allow agent operation "${operation}" in /root/project?\n\n${JSON.stringify(detail, null, 2)}`),
        onActivity: () => {},
        onOutput: async output => {
          const clean = String(output).split(/\r?\n/)
            .filter(line => !hiddenSerialMarkers.some(marker => line.includes(marker)) && !/\bagent-\d{6,}-\d+\b/.test(line))
            .join("\n");
          if (clean) await writeAgentTerminal(clean);
        },
        onBusy: async busy => {
          agentBusy = busy;
          status(busy ? "vmagent responding — Ctrl-C to stop" : "vmagent conversation active — /exit returns to shell");
          if (!busy && vmAgentController?.conversationActive) await hostBridge.sendConsole("printf 'vmagent> '");
        },
      });
      hostBridge.setAgentHandler((command, value) => vmAgentController.handle(command, value));
      setInterval(() => {
        if (!agentBusy && !vmAgentController?.conversationActive) hostBridge.send("vmagent-poll").catch(() => {});
      }, 500);
    });
  });
}).catch(error => status("host bridge failed — " + error.message));

const llmStatus = message => document.getElementById("llm-status").textContent = "WebGPU LLM: " + message;
const browserStatus = message => document.getElementById("browser-status").textContent = "AutoBro: " + message;
async function connectAutoBro({ interactive = true } = {}) {
  const storedId = localStorage.getItem("herdr.autobroExtensionId") || "";
  const storedToken = sessionStorage.getItem("herdr.autobroPairingToken") || "";
  const extensionId = interactive ? prompt("AutoBro extension ID", storedId) : storedId;
  if (!extensionId) return;
  const token = interactive ? prompt("AutoBro pairing token (kept for this tab only)", storedToken) : storedToken;
  if (!token) return;
  browserStatus("pairing…");
  try {
    const { AutoBroClient } = await import("./network/browser/autobro-client.js");
    const client = new AutoBroClient({ extensionId: extensionId.trim(), token: token.trim() });
    const health = await client.pair();
    autobroClient = client;
    vmAgentController?.resetHarness();
    localStorage.setItem("herdr.autobroExtensionId", extensionId.trim());
    sessionStorage.setItem("herdr.autobroPairingToken", token.trim());
    browserStatus(`connected — bridge v${health.bridgeVersion || "?"}`);
  } catch (error) {
    browserStatus("error — " + error.message);
  }
}
document.getElementById("connect-autobro").onclick = () => connectAutoBro();
if (localStorage.getItem("herdr.autobroExtensionId") && sessionStorage.getItem("herdr.autobroPairingToken")) connectAutoBro({ interactive: false });
const llmFileInput = document.getElementById("llm-file-input");
document.getElementById("configure-llm").onclick = () => llmFileInput.click();
try {
  const { LiteRtLmClient } = await import("./network/browser/litert-lm-client.js");
  const client = new LiteRtLmClient();
  webGpuLlmClient = client;
  client.addEventListener("activity", event => llmStatus(event.detail.message));
  hostBridge?.setLlmClient(client);
  const initialization = client.initialize();
  initialization.then(result => {
    hostBridge?.setLlmClient(client);
    llmStatus(result.modelName ? `ready — ${result.modelName}` : "ready — choose Configure LLM to load a model");
  }).catch(error => llmStatus("unavailable — " + error.message));
  llmFileInput.onchange = async () => {
    const file = llmFileInput.files[0];
    if (!file) return;
    try {
      await initialization;
      await client.importModel(file);
      hostBridge?.setLlmClient(client);
      llmStatus(`ready — ${client.modelName}`);
    } catch (error) {
      llmStatus("error — " + error.message);
    } finally {
      llmFileInput.value = "";
    }
  };
} catch (error) {
  llmStatus("unavailable — " + error.message);
}

const fileInput = document.getElementById("file-input");
document.getElementById("import-file").onclick = () => fileInput.click();
document.getElementById("open-help").onclick = () => window.open("docs/guest-tools.md", "_blank", "noopener");
fileInput.onchange = async () => {
  const file = fileInput.files[0];
  if (!file) return;
  if (file.size > 8 * 1024 * 1024) return status("import limited to 8 MiB");
  const safeName = file.name.replace(/[^A-Za-z0-9._-]/g, "_") || "imported-file";
  const bytes = new Uint8Array(await file.arrayBuffer());
  let binary = "";
  for (let offset = 0; offset < bytes.length; offset += 0x8000)
    binary += String.fromCharCode(...bytes.subarray(offset, offset + 0x8000));
  const encoded = btoa(binary);
  const command = `printf %s '${encoded}' | base64 -d > '/root/${safeName}'\n`;
  status(`importing ${safeName}…`);
  if (!hostBridge) return status("host bridge is still loading");
  await hostBridge.send(command.replace(/\n$/, ""));
  status(`imported /root/${safeName}`);
  fileInput.value = "";
};

// A backend creates a short-lived session through POST /v1/sessions and gives
// the browser the gateway URL + token in the fragment (fragments are not sent
// to this static web server). Example:
// #gateway=ws%3A%2F%2F127.0.0.1%3A8086%2Fv1%2Fethernet&token=...
const networkConfig = new URLSearchParams(location.hash.slice(1));
const gatewayURL = networkConfig.get("gateway");
const sessionToken = networkConfig.get("token");
if (gatewayURL && sessionToken) {
  history.replaceState(null, "", location.pathname + location.search);
  import("./network/browser/v86-websocket-network.js")
    .then(({ V86WebSocketNetwork }) => {
      window.v86Network = new V86WebSocketNetwork(emulator, {
        url: gatewayURL,
        token: sessionToken,
        onStatus: networkStatus,
      }).start();
    })
    .catch(error => networkStatus("error — " + error.message));
}

emulator.add_listener("emulator-ready", () => {
  setBootProgress(28, compatibilityBoot ? "Starting compatibility boot…" : "Starting VM…");
  status(`emulator ready — booting${compatibilityBoot ? " in compatibility mode" : ""}… (first boot ~30-90s)`);
});
emulator.add_listener("download-progress", (e) => {
  if (e.file_name && e.loaded != null && e.total) {
    const fraction = Math.max(0, Math.min(1, e.loaded / e.total));
    setBootProgress(10 + fraction * 55, `Downloading ${e.file_name}…`);
    status("downloading " + e.file_name + " " + Math.round(100*e.loaded/e.total) + "%");
  }
});
emulator.add_listener("download-error", (e) => {
  const message = "Download failed: " + (e.file_name || "?") + ". Reload to retry.";
  status(message);
  failBoot(message);
});
window.onerror = (msg, source) => {
  if (source && !source.startsWith(location.origin)) return;
  status("JS ERROR: " + msg);
  failBoot("Startup error: " + msg);
};
let gotSerial = false;
setTimeout(() => { if (!gotSerial) { const message = "No VM output after 120 seconds. Reload to retry automatic compatibility boot."; status(message); failBoot(message); } }, 120000);
// The kernel serial console has no window size (TIOCGWINSZ reports 0x0).
// Set it once at the first shell prompt, matching the xterm.js geometry above.
let sttySent = false;
let recentOutput = "";
let diskErrorOutput = "";
let compatibilityRestartScheduled = false;
emulator.add_listener("serial0-output-byte", (byte) => {
  if (!gotSerial) { gotSerial = true; setBootProgress(68, "Starting VM…"); status("VM booting — output live"); }
  writeSerialByte(byte);
  if (!compatibilityBoot && !compatibilityRestartScheduled) {
    diskErrorOutput = (diskErrorOutput + String.fromCharCode(byte)).slice(-256);
    if (diskErrorOutput.includes("lost interrupt") || diskErrorOutput.includes("I/O error, dev sda")) {
      compatibilityRestartScheduled = true;
      status("virtual disk DMA failed — restarting in compatibility mode…");
      const next = new URL(location.href);
      next.searchParams.set("compat", "1");
      setTimeout(() => location.replace(next.href), 1500);
    }
  }
  if (!sttySent) {
    recentOutput = (recentOutput + String.fromCharCode(byte)).slice(-64);
    if (recentOutput.endsWith(":~# ")) {
      sttySent = true;
      for (const ch of "stty rows 32 cols 100\n") emulator.serial0_send(ch);
      finishBoot();
    }
  }
});
term.onData((data) => {
  if (agentBusy) {
    if (data === "\x03") vmAgentController?.handle("stop");
    return;
  }
  if (vmAgentController?.conversationActive) {
    for (const ch of data) {
      if (ch === "\r" || ch === "\n") {
        term.write("\r\n");
        const prompt = agentInput.trim();
        agentInput = "";
        if (!prompt) { term.write("vmagent> "); continue; }
        if (prompt === "/exit" || prompt === "/quit") {
          vmAgentController.closeConversation();
          status("running — type in the terminal. Try: vmagent --help");
          term.write("[conversation closed]\r\n");
          emulator.serial0_send("\n");
          continue;
        }
        vmAgentController.handle("run", prompt);
      } else if (ch === "\x7f" || ch === "\b") {
        if (agentInput) { agentInput = agentInput.slice(0, -1); term.write("\b \b"); }
      } else if (ch === "\x03") {
        agentInput = "";
        term.write("^C\r\nvmagent> ");
      } else if (ch >= " ") {
        agentInput += ch;
        term.write(ch);
      }
    }
    return;
  }
  for (const ch of data) emulator.serial0_send(ch);
  status("Shell ready");
});
term.focus();
})().catch(error => {
  document.getElementById("status").textContent = "BOOT FAILED: " + error.message;
  const overlay = document.getElementById("boot-overlay");
  overlay?.classList.add("error");
  const message = document.getElementById("boot-message");
  if (message) message.textContent = "Boot failed: " + error.message;
});
</script>
</body>
</html>
