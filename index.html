<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>herdr in the browser (v86)</title>
<link rel="stylesheet" href="xterm.css">
<style>
  body { margin: 0; background: #0d1117; color: #c9d1d9; font: 14px system-ui, sans-serif; }
  header { padding: 10px 14px; display: flex; gap: 12px; align-items: baseline; }
  header h1 { font-size: 15px; margin: 0; }
  #status { font-size: 12px; color: #8b949e; }
  #term { padding: 0 8px 8px; }
  #screen_container { display: none; } /* VGA (tty1) hidden; serial is primary. */
  #agent-panel { display: none; margin: 0 10px 10px; padding: 10px; border: 1px solid #30363d; border-radius: 6px; background: #161b22; }
  #agent-panel textarea { box-sizing: border-box; width: 100%; min-height: 70px; color: #c9d1d9; background: #0d1117; border: 1px solid #30363d; padding: 7px; }
  #agent-panel pre { max-height: 220px; overflow: auto; white-space: pre-wrap; color: #b1bac4; }
  #tools { margin-left: auto; display: flex; flex-wrap: wrap; gap: 6px; }
  button { color: #c9d1d9; background: #21262d; border: 1px solid #30363d; border-radius: 5px; padding: 4px 8px; }
</style>
</head>
<body>
<header>
  <h1>herdr-vm</h1>
  <div id="status">loading v86…</div>
  <div id="network-status">network: disabled</div>
  <div id="llm-status">WebGPU LLM: not paired</div>
  <div id="tools">
    <button id="save-state">Save VM</button>
    <button id="restore-state">Restore VM</button>
    <button id="import-file">Import file</button>
    <button id="open-help" title="Guest command reference">Help</button>
    <button id="configure-llm" title="Pair AutoBro Web Bridge">Configure LLM</button>
    <button id="toggle-agent" title="Read-only Deep Agents coding assistant">Agent</button>
    <input id="file-input" type="file" hidden>
  </div>
</header>
<div id="term"></div>
<section id="agent-panel">
  <strong>Read-only coding agent</strong>
  <p>Workspace: <code>/root/project</code>. Reads and searches only; fixed tests require approval.</p>
  <textarea id="agent-prompt" placeholder="Inspect the project and explain the most likely cause of the failing parser test."></textarea>
  <div>
    <button id="agent-run">Run analysis</button>
    <button id="agent-stop" disabled>Stop</button>
  </div>
  <pre id="agent-activity">idle</pre>
  <pre id="agent-output"></pre>
</section>
<div id="screen_container">
  <div style="white-space:pre; font:14px monospace"></div>
  <canvas></canvas>
</div>

<script src="xterm.js"></script>
<script src="libv86-network.js"></script>
<script>
"use strict";
const status = (m) => document.getElementById("status").textContent = m;
const networkStatus = (m) => document.getElementById("network-status").textContent = "network: " + m;

const term = new Terminal({
  cols: 100, rows: 32,
  convertEol: false,
  cursorBlink: true,
  fontFamily: "monospace",
  fontSize: 14,
  theme: { background: "#0d1117" },
});
term.open(document.getElementById("term"));

const emulator = new V86({
  wasm_path: "v86-network.wasm",
  memory_size: 256 * 1024 * 1024,
  vga_memory_size: 2 * 1024 * 1024,
  bios: { url: "seabios.bin" },
  vga_bios: { url: "vgabios.bin" },
  bzimage: { url: "bzImage-network" },
  cmdline: "root=/dev/sda rw console=ttyS0 tsc=reliable noapic nolapic",
  hda: { url: "herdr-vm-network-ext4.img", async: true, size: 100663296 },
  net_device: { type: "virtio" },
  screen_container: document.getElementById("screen_container"),
  autostart: true,
});

let hostBridge;
let webGpuLlmClient;
let guestReadonlyClient;
let readonlyAgentController;
import("./network/browser/v86-host-bridge.js").then(module => {
  hostBridge = new module.V86HostBridge(emulator, { llmClient: webGpuLlmClient });
  window.v86HostBridge = hostBridge;
  import("./network/browser/v86-guest-readonly.js").then(({ V86GuestReadonlyClient }) => {
    guestReadonlyClient = new V86GuestReadonlyClient(emulator, hostBridge);
    window.v86GuestReadonly = guestReadonlyClient;
  });
  document.getElementById("save-state").onclick = async () => {
    status("saving VM state…");
    try { await module.saveVMState(emulator); status("VM state saved in this browser"); }
    catch (error) { status("save failed — " + error.message); }
  };
  document.getElementById("restore-state").onclick = async () => {
    status("restoring VM state…");
    try { await module.restoreVMState(emulator); status("VM state restored"); }
    catch (error) { status("restore failed — " + error.message); }
  };
}).catch(error => status("host bridge failed — " + error.message));

const llmStatus = message => document.getElementById("llm-status").textContent = "WebGPU LLM: " + message;
async function configureWebGpuLlm({ interactive = true } = {}) {
  const storedId = localStorage.getItem("herdr.llmExtensionId") || "";
  const storedToken = sessionStorage.getItem("herdr.llmPairingToken") || "";
  const extensionId = interactive ? prompt("AutoBro Web Bridge extension ID", storedId) : storedId;
  if (!extensionId) return;
  const token = interactive ? prompt("Web Bridge pairing token (kept for this tab only)", storedToken) : storedToken;
  if (!token) return;
  llmStatus("pairing…");
  try {
    const { WebGpuLlmClient } = await import("./network/browser/webgpu-llm-client.js");
    const client = new WebGpuLlmClient({ extensionId: extensionId.trim(), token: token.trim() });
    const result = await client.pair();
    localStorage.setItem("herdr.llmExtensionId", extensionId.trim());
    sessionStorage.setItem("herdr.llmPairingToken", token.trim());
    webGpuLlmClient = client;
    hostBridge?.setLlmClient(client);
    llmStatus(`${result.modelName || "connected"}${result.webgpu ? " — WebGPU" : " — WebGPU unavailable"}`);
  } catch (error) {
    llmStatus("error — " + error.message);
  }
}
document.getElementById("configure-llm").onclick = () => configureWebGpuLlm();
if (localStorage.getItem("herdr.llmExtensionId") && sessionStorage.getItem("herdr.llmPairingToken")) {
  configureWebGpuLlm({ interactive: false });
}

const agentPanel = document.getElementById("agent-panel");
const agentActivity = document.getElementById("agent-activity");
const agentOutput = document.getElementById("agent-output");
document.getElementById("toggle-agent").onclick = () => {
  agentPanel.style.display = agentPanel.style.display === "block" ? "none" : "block";
};
document.getElementById("agent-stop").onclick = () => readonlyAgentController?.abort();
document.getElementById("agent-run").onclick = async () => {
  const prompt = document.getElementById("agent-prompt").value.trim();
  if (!prompt) return;
  if (!webGpuLlmClient) return agentActivity.textContent = "Pair WebGPU LLM first.";
  if (!guestReadonlyClient) return agentActivity.textContent = "Guest bridge is still loading.";
  const runButton = document.getElementById("agent-run");
  const stopButton = document.getElementById("agent-stop");
  runButton.disabled = true; stopButton.disabled = false;
  agentOutput.textContent = ""; agentActivity.textContent = "starting Deep Agents…";
  readonlyAgentController = new AbortController();
  try {
    const { createHerdrReadonlyAgent } = await import("./agent/dist/agent.js");
    const harness = createHerdrReadonlyAgent({
      llmClient: webGpuLlmClient,
      guest: guestReadonlyClient,
      onActivity: event => agentActivity.textContent += "\n" + JSON.stringify(event),
      approveTest: async recipe => confirm(`Allow the read-only agent to run test recipe "${recipe}" in /root/project?`),
    });
    const result = await harness.run(prompt, { signal: readonlyAgentController.signal });
    agentOutput.textContent = result.output;
  } catch (error) {
    agentOutput.textContent = `Agent error: ${error.message}`;
  } finally {
    runButton.disabled = false; stopButton.disabled = true; readonlyAgentController = null;
  }
};

const fileInput = document.getElementById("file-input");
document.getElementById("import-file").onclick = () => fileInput.click();
document.getElementById("open-help").onclick = () => window.open("docs/guest-tools.md", "_blank", "noopener");
fileInput.onchange = async () => {
  const file = fileInput.files[0];
  if (!file) return;
  if (file.size > 8 * 1024 * 1024) return status("import limited to 8 MiB");
  const safeName = file.name.replace(/[^A-Za-z0-9._-]/g, "_") || "imported-file";
  const bytes = new Uint8Array(await file.arrayBuffer());
  let binary = "";
  for (let offset = 0; offset < bytes.length; offset += 0x8000)
    binary += String.fromCharCode(...bytes.subarray(offset, offset + 0x8000));
  const encoded = btoa(binary);
  const command = `printf %s '${encoded}' | base64 -d > '/root/${safeName}'\n`;
  status(`importing ${safeName}…`);
  if (!hostBridge) return status("host bridge is still loading");
  await hostBridge.send(command.replace(/\n$/, ""));
  status(`imported /root/${safeName}`);
  fileInput.value = "";
};

// A backend creates a short-lived session through POST /v1/sessions and gives
// the browser the gateway URL + token in the fragment (fragments are not sent
// to this static web server). Example:
// #gateway=ws%3A%2F%2F127.0.0.1%3A8086%2Fv1%2Fethernet&token=...
const networkConfig = new URLSearchParams(location.hash.slice(1));
const gatewayURL = networkConfig.get("gateway");
const sessionToken = networkConfig.get("token");
if (gatewayURL && sessionToken) {
  history.replaceState(null, "", location.pathname + location.search);
  import("./network/browser/v86-websocket-network.js")
    .then(({ V86WebSocketNetwork }) => {
      window.v86Network = new V86WebSocketNetwork(emulator, {
        url: gatewayURL,
        token: sessionToken,
        onStatus: networkStatus,
      }).start();
    })
    .catch(error => networkStatus("error — " + error.message));
}

emulator.add_listener("emulator-ready", () => status("emulator ready — booting… (first boot ~30-90s)"));
emulator.add_listener("download-progress", (e) => {
  if (e.file_name && e.loaded != null && e.total)
    status("downloading " + e.file_name + " " + Math.round(100*e.loaded/e.total) + "%");
});
emulator.add_listener("download-error", (e) => {
  status("DOWNLOAD FAILED: " + (e.file_name || "?") + " — reload to retry");
  term.write("\r\n[asset download failed: " + (e.file_name || "?") + "]\r\n");
});
window.onerror = (msg) => { status("JS ERROR: " + msg); };
let gotSerial = false;
setTimeout(() => { if (!gotSerial) status("no VM output after 120s — likely kernel/disk fetch problem; reload"); }, 120000);
// The kernel serial console has no window size (TIOCGWINSZ reports 0x0), so
// herdr would render into a 1x1 grid. Set the tty size once at the first
// shell prompt, matching the xterm.js geometry above.
let sttySent = false;
let recentOutput = "";
emulator.add_listener("serial0-output-byte", (byte) => {
  if (!gotSerial) { gotSerial = true; status("VM booting — output live"); }
  term.write(Uint8Array.of(byte));
  if (!sttySent) {
    recentOutput = (recentOutput + String.fromCharCode(byte)).slice(-16);
    if (recentOutput.endsWith(":~# ")) {
      sttySent = true;
      for (const ch of "stty rows 32 cols 100\n") emulator.serial0_send(ch);
    }
  }
});
term.onData((data) => {
  for (const ch of data) emulator.serial0_send(ch);
  status("running — type in the terminal. Try: herdr");
});
term.focus();
</script>
</body>
</html>
